version: 2
updates:
  - package-ecosystem: gomod
    directory: '/'
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      go-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      docker:
        patterns:
          - "*"
    ignore:
      - dependency-name: "golang"
        versions:
          - ">= 1.27.rc.1, < 1.27"
